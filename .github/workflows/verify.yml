name: Ruby Syntax Check

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Ruby 문법 검사
        run: |
          find . -name '*.rb' -not -path './vendor/*' -not -path './.bundle/*' \
            | xargs -r ruby -c 2>&1 \
            | grep -v 'Syntax OK' || true
          echo "Ruby syntax check completed"

      - name: ERB 문법 확인
        run: |
          find . -name '*.erb' -not -path './vendor/*' | while read f; do
            ruby -e "require 'erb'; ERB.new(File.read('$f')).result" 2>/dev/null || echo "Warning: $f"
          done || true
